<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SFAO – Submit Feedback</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Cpath d='M19 36h8v11h-8zm10-8h8v19h-8zm10-11h8v30h-8z' fill='%233b82f6'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: #475569;
    }
    
    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border-color: #cbd5e1;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    
    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    
    .nav-bg {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
  </style>
</head>
<body class="min-h-screen font-sans flex flex-col" data-theme="dark">

  <!-- Nav -->
  <nav class="nav-bg px-6 py-4 sticky top-0 z-50 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center font-bold text-lg shadow-lg">
          <i class="fas fa-poll text-white"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
            SFAO Survey
          </h1>
          <p class="text-muted text-xs">Employee Feedback Portal</p>
        </div>
      </div>
      
      <div class="flex items-center gap-6">
        <nav class="hidden md:flex gap-6">
          <a href="index.html" class="px-3 py-2 rounded-lg text-secondary hover:text-primary text-sm font-medium">
            <i class="fas fa-chart-pie mr-2"></i>Dashboard
          </a>
          <a href="survey.html" class="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium">
            <i class="fas fa-poll mr-2"></i>Survey
          </a>
          <a href="portal.html" class="px-3 py-2 rounded-lg text-secondary hover:text-primary text-sm font-medium">
            <i class="fas fa-user-circle mr-2"></i>Portal
          </a>
        </nav>
        
        <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700" id="theme-toggle">
          <i class="fas fa-sun text-lg"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-xl card rounded-3xl p-10 shadow-2xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
          <i class="fas fa-comments text-2xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Employee Feedback Survey</h1>
        <p class="text-muted">Your response is anonymous and helps improve our organization.</p>
      </div>

      <form id="survey-form" class="space-y-5">

        <!-- Name -->
        <div>
          <label class="block text-sm text-gray-300 mb-1">Your Name (optional)</label>
          <input id="name" type="text" placeholder="e.g. Jane Smith"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500"/>
        </div>

        <!-- Department -->
        <div>
          <label class="block text-sm text-gray-300 mb-1">Department <span class="text-red-400">*</span></label>
          <select id="department" required
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
            <option value="">Select department...</option>
            <option>Engineering</option>
            <option>Sales</option>
            <option>Marketing</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Operations</option>
            <option>Customer Support</option>
          </select>
        </div>

        <!-- Star Rating -->
        <div>
          <label class="block text-sm text-gray-300 mb-2">Overall Rating <span class="text-red-400">*</span></label>
          <div class="flex gap-2" id="stars">
            <button type="button" data-val="1" class="star text-3xl text-gray-600 hover:text-yellow-400 transition">★</button>
            <button type="button" data-val="2" class="star text-3xl text-gray-600 hover:text-yellow-400 transition">★</button>
            <button type="button" data-val="3" class="star text-3xl text-gray-600 hover:text-yellow-400 transition">★</button>
            <button type="button" data-val="4" class="star text-3xl text-gray-600 hover:text-yellow-400 transition">★</button>
            <button type="button" data-val="5" class="star text-3xl text-gray-600 hover:text-yellow-400 transition">★</button>
          </div>
          <input type="hidden" id="rating" value="0"/>
        </div>

        <!-- Feedback Text -->
        <div>
          <label class="block text-sm text-gray-300 mb-1">Your Feedback <span class="text-red-400">*</span></label>
          <textarea id="feedback-text" rows="4" required placeholder="Share your thoughts, issues, or suggestions..."
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 resize-none"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition text-sm">
          Submit Feedback
        </button>

        <!-- Result -->
        <div id="result" class="hidden text-center text-sm py-2 rounded-lg"></div>
      </form>
    </div>
  </main>

  <script>
    const API = 'http://localhost:8000';
    let selectedRating = 0;

    // Theme Management
    function toggleTheme() {
      const body = document.body;
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('sfao-theme', newTheme);
      
      const icon = document.querySelector('#theme-toggle i');
      icon.className = newTheme === 'dark' ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg';
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('sfao-theme') || 'dark';
      document.body.setAttribute('data-theme', savedTheme);
      const icon = document.querySelector('#theme-toggle i');
      icon.className = savedTheme === 'dark' ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg';
    }

    // Star rating
    document.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.val);
        document.getElementById('rating').value = selectedRating;
        document.querySelectorAll('.star').forEach((s, i) => {
          s.classList.toggle('text-yellow-400', i < selectedRating);
          s.classList.toggle('text-gray-600', i >= selectedRating);
        });
      });
    });

    document.getElementById('survey-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultEl = document.getElementById('result');

      const department = document.getElementById('department').value;
      const rating     = parseInt(document.getElementById('rating').value);
      const text       = document.getElementById('feedback-text').value.trim();

      if (!department) return showResult('Please select your department.', 'error');
      if (rating < 1)  return showResult('Please select a star rating.', 'error');
      if (!text)       return showResult('Please enter your feedback.', 'error');

      try {
        const res = await fetch(`${API}/survey`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: document.getElementById('name').value || 'Anonymous', department, rating, text })
        });
        const data = await res.json();
        if (res.ok) {
          showResult(`✓ Thank you! Your feedback was recorded as "${data.sentiment}" (${data.category}).`, 'success');
          e.target.reset();
          selectedRating = 0;
          document.querySelectorAll('.star').forEach(s => s.classList.replace('text-yellow-400', 'text-gray-600'));
        } else {
          showResult(data.detail || 'Submission failed.', 'error');
        }
      } catch {
        showResult('Cannot reach server. Please ensure the backend is running.', 'error');
      }
    });

    function showResult(msg, type) {
      const el = document.getElementById('result');
      el.textContent = msg;
      el.className = `text-center text-sm py-3 px-4 rounded-xl font-medium ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
      el.classList.remove('hidden');
    }

    // Initialize theme
    initTheme();
  </script>
</body>
</html>
